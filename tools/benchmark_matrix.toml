# Governed **Phase-1** / **Phase-2 Illumina** benchmark matrix (CONTEXT: benchmark matrix / allow-list).
# Rows are expanded over time; CI defaults stay synthetic and digest-pinned via `tools/manifest.toml`.

schema_version = 1

[[rows]]
id = "phase2_synthetic_local"
technology = "illumina_pe"
organism = "synthetic_diploid"
license = "in_repo"
provenance = "fixtures/phase2_synthetic"
depth_class = "smoke"
ci_tier = "pr"
fixtures = [
  "fixtures/phase2_synthetic/parent1.fa",
  "fixtures/phase2_synthetic/parent2.fa",
  "fixtures/phase2_synthetic/reads.fq",
]
digest_manifest = "tools/manifest.toml"
manifest_table = "fixtures.phase2_synthetic"
pr_scripts = [
  "scripts/phase2_illumina_diploid_reference_layer.sh",
  "scripts/phase2_illumina_graph_summaries.sh",
  "scripts/phase2_illumina_haplotype_metrics.sh",
]
main_scripts = [
  "scripts/phase2_illumina_benchmark_gate.sh",
]
nightly_scripts = [
  "scripts/phase2_illumina_benchmark_gate.sh",
  "scripts/reference_quast.sh",
]
optional_tools = ["minimap2", "quast"]
artifacts = [
  "target/phase2-graph-summaries/contigs.fa",
  "target/phase2-graph-summaries/graph.gfa",
  "target/quast-phase2-synthetic/report.tsv",
]
notes = "Default developer + PR path: substring + optional minimap2 + trex diploid assemble smoke."

