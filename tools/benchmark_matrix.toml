# Governed **Phase-1** / **Phase-2 Illumina** benchmark matrix (CONTEXT: benchmark matrix / allow-list).
# Rows are expanded over time; CI defaults stay synthetic and digest-pinned via `tools/manifest.toml`.

schema_version = 1

[[rows]]
id = "phase2_synthetic_local"
technology = "illumina_pe"
organism = "synthetic_diploid"
license = "in_repo"
provenance = "fixtures/phase2_synthetic"
depth_class = "smoke"
ci_tier = "pr"
fixtures = [
  "fixtures/phase2_synthetic/parent1.fa",
  "fixtures/phase2_synthetic/parent2.fa",
  "fixtures/phase2_synthetic/reads.fq",
]
digest_manifest = "tools/manifest.toml"
manifest_table = "fixtures.phase2_synthetic"
pr_scripts = [
  "scripts/phase2_illumina_diploid_reference_layer.sh",
  "scripts/phase2_illumina_graph_summaries.sh",
  "scripts/phase2_illumina_haplotype_metrics.sh",
]
main_scripts = [
  "scripts/phase2_illumina_benchmark_gate.sh",
]
nightly_scripts = [
  "scripts/phase2_illumina_benchmark_gate.sh",
  "scripts/reference_quast.sh",
]
optional_tools = ["minimap2", "quast"]
artifacts = [
  "target/phase2-graph-summaries/contigs.fa",
  "target/phase2-graph-summaries/graph.gfa",
]
nightly_artifacts = [
  "target/quast-phase2-synthetic/combined_reference/report.tsv",
]
notes = "Default developer + PR path: substring + optional minimap2 + trex diploid assemble smoke."

[[rows]]
id = "phase1_ref_free_golden"
technology = "illumina_se"
organism = "golden_fixture"
license = "in_repo"
provenance = "fixtures used by scripts/ref_free_smoke.sh"
depth_class = "smoke"
ci_tier = "pr"
fixtures = [
  "fixtures/tiny.fq",
  "fixtures/tiny_ref.fa",
  "fixtures/expected/ref_free_smoke",
]
pr_scripts = [
  "scripts/ref_free_smoke.sh",
]
main_scripts = [
  "scripts/benchmark_gate.sh",
  "scripts/reference_smoke.sh",
]
optional_tools = ["minimap2"]
artifacts = [
  "target/ref-free-smoke/contigs.fa",
  "target/ref-free-smoke/unitigs.fa",
  "target/ref-free-smoke/graph.gfa",
]
notes = "Phase-1 reference-free golden; see ref_free_smoke.sh."

[[rows]]
id = "phix174_real_reference"
technology = "illumina_se"
organism = "Escherichia phage phiX174"
license = "public_ncbi_refseq"
provenance = "NCBI RefSeq NC_001422.1 via E-utilities; deterministic synthetic reads generated from the pinned reference"
depth_class = "micro_real_reference"
ci_tier = "nightly"
fixtures = [
  "fixtures/phix174/reference.fa",
  "fixtures/phix174/reads.fq",
]
digest_manifest = "tools/manifest.toml"
manifest_table = "fixtures.phix174"
optional_tools = ["minimap2", "quast"]
artifacts = [
  "target/benchmarks/phix174/trex/contigs.fa",
  "target/benchmarks/phix174/trex/unitigs.fa",
  "target/benchmarks/phix174/trex/graph.gfa",
]
notes = "First real-reference micro benchmark row. Reads are deterministic smoke-scale synthetic Illumina reads over a real public reference."

[rows.trex]
tiers = ["nightly", "manual"]
out_dir = "target/benchmarks/phix174/trex"
reference = "fixtures/phix174/reference.fa"
args = [
  "illumina",
  "assemble",
  "--r1",
  "fixtures/phix174/reads.fq",
  "--kmer-size",
  "31",
  "--trusted-threshold",
  "1",
  "--out-dir",
  "target/benchmarks/phix174/trex",
]

[[rows]]
id = "ecoli_mg1655_srr001666_1k_pairs"
technology = "illumina_pe"
organism = "Escherichia coli str. K-12 substr. MG1655"
license = "public_ena"
provenance = "ENA SRR001666; first 1000 read pairs prepared by xtask fetch-data from md5-pinned FASTQ sources"
depth_class = "bacterial_real_reads_profile_1k_pairs"
ci_tier = "manual"
external_data = "ecoli_mg1655_srr001666"
fixtures = [
  "data/benchmarks/ecoli_mg1655_srr001666/r1.1000.fq",
  "data/benchmarks/ecoli_mg1655_srr001666/r2.1000.fq",
]
digest_manifest = "tools/manifest.toml"
manifest_table = "external.ecoli_mg1655_srr001666_1k_pairs"
optional_tools = ["minimap2", "quast"]
artifacts = [
  "target/benchmarks/ecoli_mg1655_srr001666_1k_pairs/trex/contigs.fa",
  "target/benchmarks/ecoli_mg1655_srr001666_1k_pairs/trex/unitigs.fa",
  "target/benchmarks/ecoli_mg1655_srr001666_1k_pairs/trex/graph.gfa",
]
notes = "First larger bacterial biological read row. The full source is 7,047,668 paired spots / 507,432,096 bases; this governed row uses a bounded 1k-pair profile subset."

[rows.trex]
tiers = ["manual"]
out_dir = "target/benchmarks/ecoli_mg1655_srr001666_1k_pairs/trex"
args = [
  "illumina",
  "assemble",
  "--r1",
  "data/benchmarks/ecoli_mg1655_srr001666/r1.1000.fq",
  "--r2",
  "data/benchmarks/ecoli_mg1655_srr001666/r2.1000.fq",
  "--kmer-size",
  "31",
  "--trusted-threshold",
  "1",
  "--out-dir",
  "target/benchmarks/ecoli_mg1655_srr001666_1k_pairs/trex",
]

[[rows]]
id = "yeast_btt_err1308583_diploid_1k_pairs"
