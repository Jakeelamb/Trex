  "trex/src/dbg/export.rs",
]
promotion_stages = [
  "report_only_candidate",
  "gfa_path",
]
gates = [
  "bash scripts/phase2_illumina_haplotype_metrics.sh",
  "cargo run -p xtask -- bench --tier manual --row yeast_btt_err1308583_diploid_10k_pairs --out target/benchmarks/yeast-btt-10k.json",
]
next_work = [
  "Label retained heterozygous bubbles when parent-specific k-mers support alternatives.",
  "Report balance and ambiguity metrics without promising haplotype-resolved FASTA.",
]

