name: ci

on:
  pull_request:
  push:
    branches: [main, master]
    tags: ["*"]
  schedule:
    # Nightly baseline for **Phase-1 benchmark gate** + **Phase-2 Illumina benchmark gate** (CONTEXT).
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust:
          - 1.74.0
          - stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Contract validators
        run: |
          python3 tools/validate_benchmark_matrix.py
          python3 tools/validate_capabilities_doc.py
      - name: PR smoke
        run: bash scripts/pr_smoke.sh
      - name: Install minimap2 (reference benchmark gate)
        if: |
          github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
          || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        run: sudo apt-get update && sudo apt-get install -y minimap2
      - name: Full Phase-2 Illumina benchmark gate (main, tags, schedule, dispatch)
        if: |
          github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch'
          || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
          || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        run: bash scripts/phase2_illumina_benchmark_gate.sh
